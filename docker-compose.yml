services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr 0.0.0.0:9092
    ports:
      - "9092:9092"
      - "8081:8081"
      - "8082:8082"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    depends_on: [postgres, redis]
    env_file: .env

  ingestion:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    ports:
      - "3001:3001"
    depends_on: [redpanda]
    env_file: .env

  consumer:
    build:
      context: .
      dockerfile: packages/consumer/Dockerfile
    depends_on: [redpanda, postgres, redis]
    env_file: .env

volumes:
  pg_data:
